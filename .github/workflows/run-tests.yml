name: Automated Tests

on:
  push:
    branches:
      - master
      - main

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t wb-automation-tests .

      - name: Run Tests inside Docker
        run: docker run --rm wb-automation-tests
      - name: Run Tests inside Docker
        env:
          REQRES_API_KEY: ${{ secrets.REQRES_API_KEY }}
        run: |
          docker run --rm -e REQRES_API_KEY="${{ secrets.REQRES_API_KEY }}" wb-automation-tests